services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* are compiled into the client bundle — set at build time.
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://core.uit.edu.vn}
    image: core-website:latest
    container_name: core-website
    restart: unless-stopped
    ports:
      # host:container — change PORT to expose elsewhere (app is on /core).
      - "${PORT:-5002}:3000"
    environment:
      NODE_ENV: production
      # SQLite file on the persisted volume below.
      DATABASE_URL: file:/app/data/app.db
      NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://core.uit.edu.vn}
      # CHANGE THESE for any real deployment.
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-core-admin}
      AUTH_SECRET: ${AUTH_SECRET:-change-this-to-a-long-random-string-please}
      # auto = seed only on first boot; set to "true" to force a reseed.
      SEED_ON_START: ${SEED_ON_START:-auto}
    volumes:
      # persists the SQLite DB across restarts/rebuilds
      - dbdata:/app/data

volumes:
  dbdata:
